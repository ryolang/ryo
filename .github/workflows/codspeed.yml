name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write

jobs:
  frontend-benchmarks:
    name: Run Frontend Simulation Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: codspeed-frontend
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed
      - name: Build the benchmark target
        run: cargo codspeed build -p ryo-frontend
      - name: Run frontend benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p ryo-frontend

  aot-benchmarks:
    name: Run AOT Walltime Benchmarks
    runs-on: codspeed-macro
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: codspeed-aot
      - name: Build Ryo compiler
        run: cargo build --release
      - name: Compile Ryo AOT binaries
        run: |
          ./target/release/ryo build benchmarks/fibonacci/fib.ryo
          mv fib benchmarks/fibonacci/fib
          rm -f fib.o
          ./target/release/ryo build benchmarks/eager_destruction/eager_destruction.ryo
          mv eager_destruction benchmarks/eager_destruction/eager_destruction
          rm -f eager_destruction.o
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed
      - name: Run E2E AOT benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: codspeed run
