name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'landing/**'
      - 'examples/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'landing/**'
      - 'examples/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: clippy
      - run: cargo build -p ryo-runtime --release
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test
      - name: Get Zig version
        id: zig-version
        run: |
          VERSION=$(grep -o 'const ZIG_VERSION: &str = "[^"]*"' ryo-backend/src/toolchain.rs | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Zig toolchain
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.ryo/toolchain
          key: zig-${{ steps.zig-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}
      - name: Install Zig toolchain
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: cargo run -- toolchain install
      - run: cargo build -p ryo-runtime --release
      - run: cargo test --workspace

  asan:
    name: ASan leak check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: asan
      - name: Get Zig version
        id: zig-version
        run: |
          VERSION=$(grep -o 'const ZIG_VERSION: &str = "[^"]*"' ryo-backend/src/toolchain.rs | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Zig toolchain
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.ryo/toolchain
          key: zig-${{ steps.zig-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}
      - name: Install Zig toolchain
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: cargo run -- toolchain install
      - run: cargo build -p ryo-runtime --release
      - run: cargo test --test asan_smoke

  valgrind:
    name: Valgrind leak check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: valgrind
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Get Zig version
        id: zig-version
        run: |
          VERSION=$(grep -o 'const ZIG_VERSION: &str = "[^"]*"' ryo-backend/src/toolchain.rs | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Zig toolchain
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.ryo/toolchain
          key: zig-${{ steps.zig-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}
      - name: Install Zig toolchain
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: cargo run -- toolchain install
      - run: cargo build -p ryo-runtime --release
      - run: cargo test --test valgrind_smoke
